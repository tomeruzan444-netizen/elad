name: Build & Deploy to Hostinger (staging)

# Runs on every push to main, and can also be triggered manually.
on:
  push:
    branches: [main]
  workflow_dispatch:

# Avoid overlapping deploys
concurrency:
  group: deploy-staging
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: staging
      url: https://red-dogfish-859245.hostingersite.com

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build (staging — noindex)
        run: npm run build:staging

      - name: Deploy to Hostinger via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          protocol: ftp
          port: 21
          timeout: 60000
          local-dir: ./dist/
          # FTP login already lands inside the site's web root, so deploy to the root.
          server-dir: ./
          # One-time full wipe + fresh upload to fix partial/encoding state.
          dangerous-clean-slate: true
          # Only changed files are uploaded (state tracked in .ftp-deploy-sync-state.json)
          exclude: |
            **/.git*
            **/.git*/**
